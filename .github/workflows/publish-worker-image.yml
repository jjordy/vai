name: Publish Worker Image (manual)

# Automatic publishing is handled by the publish-worker job in release.yml,
# which runs within the same workflow token and avoids the GITHUB_TOKEN
# anti-recursion rule that prevents cross-workflow cascade.
#
# Use this workflow to manually rebuild the worker image for an already-published
# tag (e.g. infrastructure failure, Dockerfile fix without a new release).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.1.11)"
        required: true
        type: string

# NOTE: After the first successful publish, the package is private by default.
# Go to github.com/jjordy?tab=packages → vai-worker → Package settings →
# Change visibility → Public. Otherwise FlyMachinesProvider needs registry
# credentials to pull the image.

jobs:
  publish:
    name: Build & push ghcr.io/jjordy/vai-worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          # For workflow_dispatch, check out the requested tag so we build
          # from the Dockerfile state at that point. For release-triggered
          # runs, default checkout (the tag ref) is correct.
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image version from tag
        id: version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/worker
          file: docker/worker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jjordy/vai-worker:${{ steps.version.outputs.version }}
            ghcr.io/jjordy/vai-worker:latest
          build-args: |
            VAI_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — vai --version matches release tag
        run: |
          IMAGE="ghcr.io/jjordy/vai-worker:${{ steps.version.outputs.version }}"
          docker pull "$IMAGE"
          REPORTED=$(docker run --rm "$IMAGE" vai --version | awk '{print $NF}')
          EXPECTED="${{ steps.version.outputs.version }}"
          echo "Image reports vai $REPORTED, tag is $EXPECTED"
          if [ "$REPORTED" != "$EXPECTED" ]; then
            echo "::error::Version mismatch: image says $REPORTED, tag is $EXPECTED"
            exit 1
          fi
          echo "Smoke test passed."
