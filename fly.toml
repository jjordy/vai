# fly.toml app configuration file generated for vai-server-polished-feather-2668 on 2026-04-05T21:46:18-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vai-server-polished-feather-2668'
primary_region = 'iad'

[build]
  dockerfile = 'infra/Dockerfile.server'

[env]
  VAI_LOG_LEVEL = 'info'
  VAI_PORT = '7865'
  # URL of the dashboard /cli page shown to users during `vai login --device`.
  # Set this to your actual dashboard URL before deploying to production.
  VAI_DASHBOARD_URL = 'https://dashboard.blocksynth.ai'

[http_service]
  internal_port = 7865
  force_https = true
  auto_stop_machines = 'off'
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[checks]
  [checks.health]
    port = 7865
    type = 'http'
    interval = '10s'
    timeout = '5s'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
